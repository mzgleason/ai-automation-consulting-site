<svg width="920" height="360" viewBox="0 0 920 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="920" y2="360">
      <stop stop-color="#07111F"/>
      <stop offset="1" stop-color="#05070B"/>
    </linearGradient>

    <radialGradient id="centerGlow" cx="0" cy="0" r="1"
      gradientUnits="userSpaceOnUse"
      gradientTransform="translate(480 180) rotate(90) scale(180 320)">
      <stop stop-color="#245DFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#245DFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="signal" x1="140" y1="180" x2="760" y2="180">
      <stop stop-color="#2D7CFF"/>
      <stop offset="0.45" stop-color="#6D6BFF"/>
      <stop offset="1" stop-color="#00C2FF"/>
    </linearGradient>

    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="920" height="360" rx="28" fill="url(#bg)"/>

  <ellipse cx="470" cy="180" rx="260" ry="140"
   fill="url(#centerGlow)"
   filter="url(#blur)"/>

  <g opacity="0.85">
    <circle cx="150" cy="150" r="2.5" fill="#2D7CFF"/>
    <circle cx="168" cy="170" r="2" fill="#5F7DFF"/>
    <circle cx="146" cy="198" r="3" fill="#00C2FF"/>
    <circle cx="184" cy="212" r="2" fill="#6D6BFF"/>
    <circle cx="198" cy="176" r="2" fill="#2D7CFF"/>
  </g>

  <path
   d="M180 180C260 180 300 130 380 130C470 130 470 230 560 230C640 230 670 180 760 180"
   stroke="url(#signal)"
   stroke-width="3"
   stroke-linecap="round"
   fill="none"
  />

  <path
   d="M180 180C260 180 300 130 380 130C470 130 470 230 560 230C640 230 670 180 760 180"
   stroke="url(#signal)"
   stroke-opacity="0.45"
   stroke-width="14"
   stroke-linecap="round"
   fill="none"
   filter="url(#blur)"
  />

  <g transform="translate(430 180)">
    <circle r="54"
      stroke="rgba(110,120,255,.18)"
      stroke-width="1"/>

    <circle r="36"
      stroke="#6D6BFF"
      stroke-width="3"
      stroke-dasharray="120 40"
      transform="rotate(-90)"
    />

    <circle r="5"
      fill="#6D6BFF"
      filter="url(#softGlow)"
    />

    <circle cx="0" cy="-36" r="3"
      fill="#00C2FF"/>

    <text
      y="8"
      text-anchor="middle"
      fill="#F5F7FA"
      font-family="Inter, Arial"
      font-size="24"
      font-weight="700">
      82
    </text>
  </g>

  <path
   d="M760 180C800 180 812 146 844 132"
   stroke="#2DFFB4"
   stroke-width="2.5"
   stroke-linecap="round"
  />

  <path
   d="M760 180C800 180 812 214 844 228"
   stroke="#FF4D6D"
   stroke-width="2.5"
   stroke-linecap="round"
  />

  <g transform="translate(850 118)">
    <circle r="22"
      fill="rgba(45,255,180,.12)"
      stroke="rgba(45,255,180,.4)"/>

    <path
      d="M-7 0L-1 6L10 -8"
      stroke="#2DFFB4"
      stroke-width="3"
      stroke-linecap="round"
      stroke-linejoin="round"/>
  </g>

  <g transform="translate(850 242)">
    <circle r="22"
      fill="rgba(255,77,109,.08)"
      stroke="rgba(255,77,109,.32)"/>

    <path
      d="M-6 -6L6 6M6 -6L-6 6"
      stroke="#FF4D6D"
      stroke-width="3"
      stroke-linecap="round"/>
  </g>
</svg>
