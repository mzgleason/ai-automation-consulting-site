  <text x="120" y="486" fill="#8BD3FF" font-family="Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="2">WHY IT WORKED</text>
  <text x="120" y="532" fill="#F2F5F7" font-family="Arial, sans-serif" font-size="30" font-weight="700">The leverage came from workflow structure, not one giant prompt.</text>
  <text x="120" y="574" fill="#AAB5BF" font-family="Arial, sans-serif" font-size="22">Explicit stages, review gates, and observable handoffs reduced friction and improved consistency.</text>
