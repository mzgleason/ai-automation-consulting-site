<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Editorial product workflow showing capture, draft, review, and publish stages">
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1440" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0D13"/>
      <stop offset="1" stop-color="#171E2D"/>
    </linearGradient>
    <linearGradient id="stageFill" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#161E2F"/>
      <stop offset="1" stop-color="#111826"/>
    </linearGradient>
    <linearGradient id="activeBorder" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8FA8FF"/>
      <stop offset="1" stop-color="#5A7BFF"/>
    </linearGradient>
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#02040A" flood-opacity="0.45"/>
    </filter>
    <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dotGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#273149" fill-opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect x="80" y="72" width="1440" height="856" rx="34" fill="url(#dotGrid)" opacity="0.55"/>

  <rect x="132" y="118" width="1336" height="112" rx="24" fill="#0F1522" stroke="#27324B" stroke-width="2"/>
  <text x="174" y="166" fill="#F5F8FF" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">AI-Driven LinkedIn Content Workflow</text>
  <text x="174" y="203" fill="#9EA8BE" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500">Operator dashboard · Weekly publishing system</text>

  <g filter="url(#softShadow)">
