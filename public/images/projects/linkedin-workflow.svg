    <rect x="464" y="280" width="304" height="560" rx="24" fill="url(#stageFill)" stroke="url(#activeBorder)" stroke-width="2.5"/>
    <rect x="800" y="280" width="304" height="560" rx="24" fill="url(#stageFill)" stroke="#2E3B58" stroke-width="2"/>
    <rect x="1136" y="280" width="304" height="560" rx="24" fill="url(#stageFill)" stroke="#2E3B58" stroke-width="2"/>
  </g>

  <g fill="#9CABCC" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="600" letter-spacing="0.04em">
